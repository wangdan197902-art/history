openapi: 3.0.3
info:
  title: Anthropic Claude Messages API
  version: 1.0.0
  description: |
    Anthropic Claude Messages API 契约
    用于地区化重写历史事件,确保中立性和地区相关性
    Mock 端点: http://127.0.0.1:8765/anthropic
    生产端点: https://api.anthropic.com/v1
servers:
  - url: https://api.anthropic.com/v1
    description: 生产环境
  - url: http://127.0.0.1:8765/anthropic
    description: Mock 环境(本地开发)
security:
  - ApiKeyAuth: []
paths:
  /messages:
    post:
      summary: 调用 Claude 生成响应
      description: 用于地区化重写历史事件
      operationId: createMessage
      tags: [anthropic]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
            example:
              model: "claude-3-5-sonnet-20241022"
              max_tokens: 2048
              system: "你是历史事件地区化专家,请将事件用中立的语气重写,突出与指定地区的关联。"
              messages:
                - role: "user"
                  content: "事件:1921年中国共产党第一次全国代表大会在上海召开\n地区:中国\n请重写:"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                id: "msg_01ABC"
                type: "message"
                role: "assistant"
                model: "claude-3-5-sonnet-20241022"
                content:
                  - type: "text"
                    text: "1921年7月,中国共产党第一次全国代表大会在上海召开,标志着中国共产党的正式成立。"
                stop_reason: "end_turn"
                usage:
                  input_tokens: 50
                  output_tokens: 80
        '401':
          description: 未授权
        '429':
          description: 限流
        '500':
          description: 服务器错误
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    MessageRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
          enum:
            - claude-3-5-sonnet-20241022
            - claude-3-5-haiku-20241022
            - claude-3-opus-20240229
          description: 模型 ID
          example: "claude-3-5-sonnet-20241022"
        max_tokens:
          type: integer
          minimum: 1
          maximum: 8192
          description: 最大输出 token 数
          example: 2048
        system:
          type: string
          description: 系统提示词
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Message'
          description: 对话消息列表
        temperature:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
          description: 温度参数
        stream:
          type: boolean
          default: false
          description: 是否流式输出
        stop_sequences:
          type: array
          items: { type: string }
          description: 停止序列
    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
          description: 角色
        content:
          type: string
          description: 消息内容
    MessageResponse:
      type: object
      required: [id, type, role, model, content, stop_reason, usage]
      properties:
        id:
          type: string
          description: 消息 ID
          example: "msg_01ABC"
        type:
          type: string
          enum: [message]
          description: 类型
        role:
          type: string
          enum: [assistant]
          description: 角色
        model:
          type: string
          description: 实际使用的模型
        content:
          type: array
          items:
            type: object
            required: [type, text]
            properties:
              type:
                type: string
                enum: [text]
              text:
                type: string
                description: 响应文本
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, stop_sequence]
          description: 停止原因
        usage:
          type: object
          required: [input_tokens, output_tokens]
          properties:
            input_tokens:
              type: integer
              description: 输入 token 数
            output_tokens:
              type: integer
              description: 输出 token 数
